    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --expo-red: #E60012;
            --expo-blue: #0068B7;
            --expo-gray: #D2D7DA;
            --expo-white: #FFFFFF;
            --expo-dark-gray: #222426;
            --font-main: "Helvetica Now Text Medium", "Helvetica Now Text", "YuGothic", "Yu Gothic", "遊ゴシック体", "遊ゴシック", sans-serif;
            
            /* UI用カラー */
            --red: var(--expo-red);
            --white: var(--expo-white);
            --gray: var(--expo-gray);
            --dark: var(--expo-dark-gray);
        }
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--expo-white);
            color: var(--expo-dark-gray);
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; 
            touch-action: none; -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
            font-weight: 500; height: 100%;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        /* オープニング画面 */
        #opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; background-color: var(--expo-white);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }
        .opening-blob {
            position: absolute; border-radius: 50%; opacity: 0.15; z-index: -1; filter: blur(60px);
        }
        .blob-red { width: 300px; height: 300px; background: var(--expo-red); top: -50px; left: -50px; }
        .blob-blue { width: 250px; height: 250px; background: var(--expo-blue); bottom: 10%; right: -30px; }
        .opening-content { text-align: center; }
        .opening-sub-top { font-size: 10px; font-weight: bold; letter-spacing: 0.4em; color: var(--expo-dark-gray); margin-bottom: 12px; }
        .opening-main-title { font-size: 32px; font-weight: 900; margin-bottom: 4px; letter-spacing: -0.02em; }
        .text-red { color: var(--expo-red); }
        .text-gray { color: var(--expo-gray); }
        .text-blue { color: var(--expo-blue); }
        .opening-sub-bottom { font-size: 14px; font-style: italic; color: var(--expo-gray); letter-spacing: 0.1em; margin-bottom: 48px; font-weight: bold; }
        .opening-start-btn {
            background: var(--expo-blue); color: var(--expo-white); border: none; padding: 14px 60px; border-radius: 30px;
            font-size: 14px; font-weight: bold; letter-spacing: 0.3em; box-shadow: 0 10px 20px rgba(0, 104, 183, 0.2);
            cursor: pointer; outline: none; font-family: var(--font-main);
        }

        #main-app { visibility: hidden; opacity: 0; transition: opacity 1s ease; }

        /* 背景 */
        #bg-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-color: var(--expo-white); display: flex; justify-content: center; align-items: center;
        }
        #bg-image { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        
        #global-move { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        
        /* ドック */
        #dock {
            position: fixed;
            bottom: max(28px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--white);
            border-radius: 100px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 16px rgba(0,0,0,.09), 0 12px 32px rgba(0,0,0,.08);
        }

        .d-btn {
            width: 64px; height: 64px; border-radius: 100px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: none; border: none; outline: none;
            transition: color .2s, background .15s;
            color: var(--expo-blue);
        }

        .d-btn.playing { color: var(--red); }
        .d-sep { width: 1px; height: 26px; background: var(--gray); }

        /* 設定アイコン */
        .gear-container { position: relative; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .gear-icon { width: 100%; height: 100%; fill: currentColor; stroke: none; }
        .gear-eye-white { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--expo-white); border-radius: 50%; }
        .gear-pupil { position: absolute; top: 40%; left: 60%; transform: translate(-50%, -50%); width: 5px; height: 5px; background: var(--expo-blue); border-radius: 50%; }

        /* オーバーレイ */
        #overlay {
            position: fixed; inset: 0; z-index: 140;
            background: rgba(34,36,38,.25);
            opacity: 0; visibility: hidden;
            transition: opacity .35s, visibility .35s;
            backdrop-filter: blur(2px);
        }
        #overlay.on { opacity: 1; visibility: visible; }

        /* 設定パネル */
        #panel {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: min(320px, 100vw); z-index: 150;
            background: var(--white);
            transform: translateX(100%);
            transition: transform .42s cubic-bezier(.4,0,.2,1);
            box-shadow: -6px 0 48px rgba(0,0,0,.12);
            display: flex;
            flex-direction: column;
        }
        #panel.on { transform: translateX(0); }

        .ph {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .ph-title { font-size: 18px; font-weight: 900; letter-spacing: 0.05em; color: var(--expo-dark-gray); }
        .ph-close { background: none; border: none; cursor: pointer; color: var(--expo-gray); padding: 4px; }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .menu-item { margin-bottom: 20px; }
        .menu-label { font-size: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 0.05em; font-weight: bold; }
        .menu-label span { color: var(--expo-blue); }

        .reset-bg-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; margin-bottom: 10px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: bold; color: var(--expo-blue); }
        .bg-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ddd; background: #FFFFFF; }
        
        .part-toggles { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
        .mute-btn { flex: 1; padding: 12px 0; border-radius: 12px; border: 1px solid #ddd; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-family: inherit; color: var(--expo-dark-gray); }
        .mute-btn span { font-size: 9px; font-weight: bold; margin-top: 6px; }
        
        .mute-btn.active { background: #f0f1f2; border-color: #ccc; color: #999; }
        
        .eye-icon { position: relative; border-radius: 50%; overflow: hidden; transition: filter 0.2s, opacity 0.2s, box-shadow 0.2s; }
        .eye-icon-white { position: absolute; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
        .eye-icon-pupil { position: absolute; background: var(--expo-blue); border-radius: 50%; transform: translate(-50%, -50%); }

        .mute-btn.active .eye-icon { 
            filter: grayscale(1); 
            opacity: 0.6;
            box-shadow: 0 0 0 2px white;
        }

        .tempo-controls { display: flex; gap: 8px; margin-top: 8px; }
        .tempo-btn { flex: 1; height: 36px; border-radius: 6px; border: 1px solid #ddd; background: white; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: bold; color: var(--expo-blue); }
        .tempo-btn.active { background: var(--expo-blue); color: white; border-color: var(--expo-blue); }
        .photo-upload-container { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; border-radius: 8px; padding: 10px 12px; cursor: pointer; border: 1px solid #ddd; color: var(--expo-blue); font-weight: bold; }
        .photo-upload-text { font-size: 11px; }
        .menu-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; font-size: 9px; color: #666; line-height: 1.6; }
        .menu-footer a { color: var(--expo-blue); text-decoration: none; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--expo-blue); }
        #file-input { display: none; }
    </style>
</head>

<script>
// =========================================================
// PWA 初期化
// =========================================================
(function initPWA() {
    function drawIcon(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const s = size / 32;
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, size, size);
        ctx.save();
        ctx.strokeStyle = '#E60012'; ctx.lineWidth = 2.8 * s; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(18 * s, 5 * s); ctx.lineTo(18 * s, 22 * s); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#E60012';
        ctx.beginPath();
        ctx.moveTo(12 * s, 17 * s);
        ctx.bezierCurveTo(6 * s, 17 * s, 4 * s, 21 * s, 4 * s, 25 * s);
        ctx.bezierCurveTo(4 * s, 29 * s, 8 * s, 31 * s, 12 * s, 31 * s);
        ctx.bezierCurveTo(16 * s, 31 * s, 20 * s, 28 * s, 20 * s, 24 * s);
        ctx.bezierCurveTo(20 * s, 20 * s, 17 * s, 17 * s, 12 * s, 17 * s);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(12 * s, 24 * s, 4.2 * s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0068B7'; ctx.beginPath(); ctx.arc(13.5 * s, 23 * s, 2.2 * s, 0, Math.PI * 2); ctx.fill();
        return canvas;
    }
    const icon192 = drawIcon(192).toDataURL('image/png');
    const icon512 = drawIcon(512).toDataURL('image/png');
    const icon180 = drawIcon(180).toDataURL('image/png');
    const appleIconEl = document.getElementById('apple-touch-icon');
    if (appleIconEl) appleIconEl.href = icon180;
    const manifest = {
        name: 'こみゃくのおと', short_name: 'こみゃくのおと', start_url: './', display: 'standalone',
        background_color: '#FFFFFF', theme_color: '#FFFFFF',
        icons: [
            { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
            { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const manifestURL = URL.createObjectURL(manifestBlob);
    const manifestEl = document.getElementById('pwa-manifest');
    if (manifestEl) manifestEl.href = manifestURL;
    if ('serviceWorker' in navigator) {
        // Blob URLでのSW登録はほぼ全ブラウザでブロックされ無効なため、実体ファイル(./sw.js)を登録する。
        // sw.js は index.html と同じディレクトリに配置してください。
        navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(err => console.warn('[PWA] SW registration failed', err));
    }
})();

// --- CONFIG & CONSTANTS ---
const CONFIG = {

let width, height, dpr;
let entities = [];
let isMasterPlaying = false;
let isPressing = false;
let mouseX = 0, mouseY = 0;
let bodyY = 0, bodyScaleY = 1.0, jumpVelocity = 0, jumpTimer = 0;
let centerY = 0; 
let currentCoMyakuRadius = CONFIG.CO_MYAKU.RADIUS;

const audioState = {

};

function dbToGain(db) { if (db <= -60) return 0; return Math.pow(10, db / 20); }

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bgContainer = document.getElementById('bg-container');
const bgImage = document.getElementById('bg-image');

function startApp() {
    const opening = document.getElementById('opening-screen');
    const app = document.getElementById('main-app');
    opening.style.opacity = '0';
    setTimeout(() => {
        opening.style.visibility = 'hidden';
        app.style.visibility = 'visible';
        app.style.opacity = '1';
        togglePlayback();

function resetBackground(color) {
    bgImage.style.display = 'none';
    bgContainer.style.backgroundColor = color;

function openPanel() {
    document.getElementById('panel').classList.add('on');

}

function closePanel() {
    document.getElementById('panel').classList.remove('on');
    document.getElementById('overlay').classList.remove('on');
}

// --- SOUND ENGINE ---
class SoundEngine {
    constructor() {
        this.ctx = null; this.ready = false; this.steps = 0; this.reverb = null; this.masterGain = null;
        this.schedulerTimer = null; this.nextStepTime = 0;
        this.scales = {
            strings: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 659.25],
            stringsHigh: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 659.25],
            stringsLow: [164.81, 185.00, 207.65, 220.00, 246.94, 277.18, 329.63],
            bass:     [82.41, 103.83, 123.47],  // E2, G#2, B2 (Eメジャートライアド)
            bassHigh: [164.82, 246.94],           // E3, B3 (Mid)
            piano1: [329.63, 415.30, 493.88, 659.25],
            piano2: [164.81, 207.65, 246.94, 293.66, 329.63],
            contact: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 622.25, 659.25]
        };
        this.analysers = { piano: null, strings: null, bass: null };
    }

    async init() {
        if (!this.ctx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();

            // --- Limiter（最終段） ---
            this.limiter = this.ctx.createDynamicsCompressor();
            this.limiter.threshold.value = -2.0;
            this.limiter.knee.value      =  0.0;
            this.limiter.ratio.value     = 20.0;
            this.limiter.attack.value    = 0.001;
            this.limiter.release.value   = 0.1;
            this.limiter.connect(this.ctx.destination);

            // --- Master dry bus (合算用、ボリューム自体はパート別volumeGainで適用) ---
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 1.0;
            this.masterGain.connect(this.limiter);

            // --- Reverb ---
            this.reverb = this.ctx.createConvolver();
            this.reverb.buffer = this.buildReverbIR(audioState.tapeEcho.reverbType);

            this.reverbHPF = this.ctx.createBiquadFilter();
            this.reverbHPF.type = 'highpass';
            this.reverbHPF.frequency.value = 80;
            this.reverbHPF.Q.value = 0.5;

            this.reverbOut = this.ctx.createGain();
            this.reverbOut.gain.value = 1.0;

            this.reverbHPF.connect(this.reverb);
            this.reverb.connect(this.reverbOut);
            this.reverbOut.connect(this.limiter);

            // --- パート別 reverb send ---
            this.reverbSends = {
                piano:   this.ctx.createGain(),
                strings: this.ctx.createGain(),
                bass:    this.ctx.createGain(),
            };
            this.reverbSends.piano.gain.value   = 1.0;
            this.reverbSends.strings.gain.value = 1.0;
            this.reverbSends.bass.gain.value    = 0.1;
            Object.values(this.reverbSends).forEach(s => s.connect(this.reverbHPF));

            // --- パート別マスターボリュームゲイン ---
            // analyser → volumeGain(masterDb) → masterGain(dry合算) + reverbSends[part]
            // ここでマスターボリュームを適用することで、ドライ・リバーブ両方に
            // 同じ比率でボリュームが効き、パート間バランス(bass=0.1など)も保たれる。
            this.volumeGains = {
                piano:   this.ctx.createGain(),
                strings: this.ctx.createGain(),
                bass:    this.ctx.createGain(),
            };
            const initGain = dbToGain(audioState.masterDb);
            Object.values(this.volumeGains).forEach(g => g.gain.value = initGain);

            // --- アナライザー ---
            ['piano', 'strings', 'bass'].forEach(p => {
                const node = this.ctx.createAnalyser(); node.fftSize = 256;
                this.analysers[p] = node;
                node.connect(this.volumeGains[p]);
                this.volumeGains[p].connect(this.masterGain);
                this.volumeGains[p].connect(this.reverbSends[p]);
            });

            // --- コンタクトサウンド用ボリュームゲイン ---
            // contactBusも他パートと同じくマスターボリュームの影響を受けるようにする
            this.contactVolumeGain = this.ctx.createGain();
            this.contactVolumeGain.gain.value = initGain;
            this.contactVolumeGain.connect(this.masterGain);
            this.contactVolumeGain.connect(this.reverbHPF);
        }
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        this.ready = true;
    }

    // hall / plate / spring の3種のIRを生成して返す
    buildReverbIR(type) {
        const sr = this.ctx.sampleRate;
        type = type || 'metro';

        function normalize(buf) {
            let sumSq = 0;
            for (let c = 0; c < buf.numberOfChannels; c++) {
                const d = buf.getChannelData(c);
                for (let i = 0; i < d.length; i++) sumSq += d[i] * d[i];
            }
            const rms = Math.sqrt(sumSq / (buf.length * buf.numberOfChannels));
            const norm = 0.08 / (rms + 1e-9);
            for (let c = 0; c < buf.numberOfChannels; c++) {
                const d = buf.getChannelData(c);
                for (let i = 0; i < d.length; i++) d[i] *= norm;
            }
            return buf;
        }

        if (type === 'metro') {
            // ── Metro: 夢洲駅コンコース 190m × 17m ───────────────
            // RT60 ≈ 4.5s (体積≒19,000㎥、吸音率0.04)
            // 幅17m → 壁間往復 = 17/340×2 ≒ 0.1s → フラッターエコー周期
            // 端壁190m → 0.56s遅延で強い反射が到達
            // コンクリート硬面 → 高域が明るく長く残る
            const len = Math.floor(sr * 4.5);
            const buf = this.ctx.createBuffer(2, len, sr);
            const pre = Math.floor(sr * 0.012);

            // 幅方向フラッターエコー（50ms間隔、コンクリート反射率≒0.68ずつ減衰）
            const flutterTaps = [];
            let flutterGain = 0.72;
            for (let n = 1; n <= 12; n++) {
                flutterTaps.push({ t: n * 0.050, g: flutterGain });
                flutterGain *= 0.68;
            }
            // 端壁反射（190m）
            const endWallTap = { t: 0.559, g: 0.18 };
            const endWallTap2 = { t: 1.118, g: 0.06 };

            for (let c = 0; c < 2; c++) {
                const d = buf.getChannelData(c);
                const chMod = c === 0 ? 1.0 : 0.92;

                for (let i = 0; i < len; i++) {
                    if (i < pre) { d[i] = 0; continue; }
                    const iRel = i - pre;
                    const t = iRel / sr;

                    // フラッターエコー（L/Rで位相を反転しステレオ広がりを出す）
                    let flutter = 0;
                    flutterTaps.forEach((tap, idx) => {
                        const tapIdx = Math.floor(tap.t * sr);
                        if (iRel === tapIdx)
                            flutter = tap.g * (c === 0 ? 1 : (idx % 2 === 0 ? -0.88 : 0.88));
                    });

                    // 端壁反射
                    let endWall = 0;
                    if (iRel === Math.floor(endWallTap.t * sr))  endWall =  endWallTap.g * chMod;
                    if (iRel === Math.floor(endWallTap2.t * sr)) endWall = endWallTap2.g * chMod;

                    // 拡散尾引き: 高域ゆっくり、低域やや速め（コンクリートの明るさ）
                    const noise = Math.random() * 2 - 1;
                    const hfTail = noise * Math.exp(-t * 0.85) * 0.22; // 明るい長い尾引き
                    const lfTail = noise * Math.exp(-t * 2.0)  * 0.10;

                    d[i] = (flutter + endWall + hfTail + lfTail) * chMod;
                }
            }
            return normalize(buf);

        } else {
            // ── Pavilion: 膜構造大空間 ─────────────────────────
            // RT60 ≈ 2.8s (膜素材は高域を吸収 → Metroより短く暗い)
            // 初期反射なし → 拡散場がゆっくり立ち上がる
            // 低域・膜モードが長く残り、高域は速く消える
            // Metroとの対比: 暗く・柔らかく・短い
            const len = Math.floor(sr * 2.8);
            const buf = this.ctx.createBuffer(2, len, sr);
            const pre = Math.floor(sr * 0.040);

            // 膜固有振動モード（L/Rで微差）
            const membraneModes = [
                [{ f: 47, a: 0.32, decay: 2.2 }, { f: 71, a: 0.22, decay: 1.8 }, { f: 109, a: 0.13, decay: 1.3 }],
                [{ f: 49, a: 0.30, decay: 2.0 }, { f: 74, a: 0.20, decay: 1.6 }, { f: 113, a: 0.11, decay: 1.2 }],
            ];

            for (let c = 0; c < 2; c++) {
                const d = buf.getChannelData(c);
                const modes = membraneModes[c];

                for (let i = 0; i < len; i++) {
                    if (i < pre) { d[i] = 0; continue; }
                    const t = (i - pre) / sr;

                    // ゆっくりした立ち上がり（200ms かけて最大値へ）
                    const buildUp = Math.min(1.0, t / 0.20);

                    // 高域: 膜が吸収するので速く消える（暗い特性）
                    const hfNoise = (Math.random() * 2 - 1) * Math.exp(-t * 3.5) * 0.14;
                    // 低域: 大空間で適度に残る
                    const lfNoise = (Math.random() * 2 - 1) * Math.exp(-t * 1.2) * 0.20;

                    // 膜モード（暖かい低音の尾引き）
                    let membrane = 0;
                    modes.forEach(m => {
                        membrane += Math.sin(2 * Math.PI * m.f * t)
                            * Math.exp(-t / m.decay) * m.a;
                    });

                    d[i] = (hfNoise + lfNoise + membrane) * buildUp;
                }
            }
            return normalize(buf);
        }
    }

    setReverbType(type) {
        if (audioState.tapeEcho.reverbType === type) return; // 同じタイプなら何もしない
        audioState.tapeEcho.reverbType = type;
        if (this.reverb) this.reverb.buffer = this.buildReverbIR(type);
        ['metro','pavilion'].forEach(t =>
            document.getElementById('rv-' + t).classList.toggle('active', t === type)
        );
    }

    updateMasterVolume(db) {
        const g = dbToGain(db);
        if (!this.volumeGains) return;
        Object.values(this.volumeGains).forEach(node => node.gain.setTargetAtTime(g, this.ctx.currentTime, 0.05));
        if (this.contactVolumeGain) this.contactVolumeGain.gain.setTargetAtTime(g, this.ctx.currentTime, 0.05);
    }

    // 各パートのanalyserから実際の音量(0〜1に正規化)を読み取る。
    // これを使うことで「見た目の演出」が本当の音の大きさに連動する。
    getLevel(analyser) {
        if (!analyser) return 0;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        return (sum / data.length) / 255;
    }

    getOverallLevel() {
        const piano = this.getLevel(this.analysers.piano);
        const strings = this.getLevel(this.analysers.strings);
        const bass = this.getLevel(this.analysers.bass);
        return { piano, strings, bass, overall: Math.max(piano, strings, bass) };
    }

    triggerPiano(freq, panX, gain, isHigh = false, time = null) {
        if (!this.ready || audioState.pianoMuted) return;
        const now = time !== null ? time : this.ctx.currentTime;
        const dur = isHigh ? 3.2 : 5.0;
        const toneFreq = 1005; // 800 * 10^0.10 ≒ 1005Hz (Tone 10% 固定)

        const sustainPartials = [
            { ratio: 1, g: 1.00, decay: 1.0  },
            { ratio: 2, g: 0.18, decay: 0.45 },
        ];
        const attackPartials = [
            { ratio: 4, g: 0.22, decaySec: 0.12 },
            { ratio: 6, g: 0.12, decaySec: 0.07 },
            { ratio: 8, g: 0.06, decaySec: 0.04 },
        ];

        const mixGain = this.ctx.createGain();
        mixGain.gain.setValueAtTime(gain * audioState.pianoVol * 0.5, now);

        sustainPartials.forEach(({ ratio, g, decay }) => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * ratio, now);
            const eg = this.ctx.createGain();
            eg.gain.setValueAtTime(0, now);
            eg.gain.linearRampToValueAtTime(g, now + 0.008);
            eg.gain.exponentialRampToValueAtTime(0.001, now + dur * decay);
            osc.connect(eg); eg.connect(mixGain);
            osc.start(now); osc.stop(now + dur * decay + 0.05);
        });
        attackPartials.forEach(({ ratio, g, decaySec }) => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * ratio, now);
            const eg = this.ctx.createGain();
            eg.gain.setValueAtTime(0, now);
            eg.gain.linearRampToValueAtTime(g, now + 0.004);
            eg.gain.exponentialRampToValueAtTime(0.001, now + decaySec);
            osc.connect(eg); eg.connect(mixGain);
            osc.start(now); osc.stop(now + decaySec + 0.02);
        });

        const toneLP = this.ctx.createBiquadFilter();
        toneLP.type = 'lowpass';
        toneLP.frequency.setValueAtTime(toneFreq, now);
        toneLP.Q.setValueAtTime(0.5, now);

        const cabinetLow = this.ctx.createBiquadFilter();
        cabinetLow.type = 'peaking';
        cabinetLow.frequency.setValueAtTime(250, now);
        cabinetLow.gain.setValueAtTime(3.0, now);
        cabinetLow.Q.setValueAtTime(0.8, now);

        const notch = this.ctx.createBiquadFilter();
        notch.type = 'peaking';
        notch.frequency.setValueAtTime(3000, now);
        notch.gain.setValueAtTime(-10, now);
        notch.Q.setValueAtTime(1.2, now);

        const panner = this.ctx.createStereoPanner();
        panner.pan.setValueAtTime(panX, now);

        mixGain.connect(toneLP);
        toneLP.connect(cabinetLow);
        cabinetLow.connect(notch);
        notch.connect(panner);
        panner.connect(this.analysers.piano);
    }

    triggerStrings(freq, panX, gain, type = 'high', time = null) {
        if (!this.ready || audioState.stringsMuted) return;
        const now = time !== null ? time : this.ctx.currentTime;
        const isHigh = type === 'high';
        const attackTime  = 0.9;
        const releaseTime = 2.8;
        const totalDur    = attackTime + releaseTime;
        const cutoff      = isHigh ? 3200 : 1800;
        const CHORUS_DEPTH = 0.20;

        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now);

        const env = this.ctx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(gain * audioState.stringsVol * 1.5, now + attackTime);
        env.gain.exponentialRampToValueAtTime(0.001, now + totalDur);

        const lp = this.ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(cutoff, now);
        lp.Q.setValueAtTime(0.6, now);

        osc.connect(env); env.connect(lp);
        osc.start(now); osc.stop(now + totalDur + 0.2);

        const chorusRate  = 0.5;
        const vibratoRate = 4.0;
        const bbdPans = [-0.7, 0.0, 0.7];

        for (let i = 0; i < 3; i++) {
            const phaseOffset = (i * 2 * Math.PI) / 3;

            const delay = this.ctx.createDelay(0.03);
            delay.delayTime.setValueAtTime(0.007, now);

            const lfoC = this.ctx.createOscillator();
            lfoC.type = 'sine';
            lfoC.frequency.setValueAtTime(chorusRate, now);
            const lfoCGain = this.ctx.createGain();
            lfoCGain.gain.setValueAtTime(0.004 * CHORUS_DEPTH, now);

            const lfoV = this.ctx.createOscillator();
            lfoV.type = 'sine';
            lfoV.frequency.setValueAtTime(vibratoRate, now);
            const lfoVGain = this.ctx.createGain();
            lfoVGain.gain.setValueAtTime(0.001 * CHORUS_DEPTH, now);

            // iOS Safari対策: startTimeを0未満にしない
            const cOffset = phaseOffset / (2 * Math.PI * chorusRate);
            const vOffset = phaseOffset / (2 * Math.PI * vibratoRate);
            const cStart = Math.max(0, now - cOffset);
            const vStart = Math.max(0, now - vOffset);

            lfoC.connect(lfoCGain); lfoCGain.connect(delay.delayTime);
            lfoV.connect(lfoVGain); lfoVGain.connect(delay.delayTime);
            lfoC.start(cStart); lfoC.stop(now + totalDur + 0.2);
            lfoV.start(vStart); lfoV.stop(now + totalDur + 0.2);

            const bbdGain = this.ctx.createGain();
            bbdGain.gain.setValueAtTime(1 / 3, now);

            const panner = this.ctx.createStereoPanner();
            panner.pan.setValueAtTime(bbdPans[i], now);

            lp.connect(delay); delay.connect(bbdGain);
            bbdGain.connect(panner);
            panner.connect(this.analysers.strings);
        }
    }

    triggerBassSound(freq, pan = 0, time = null) {
        if (!this.ready || audioState.bassMuted) return;
        const now = time !== null ? time : this.ctx.currentTime;
        const f = freq;
        const attackTime  = 1.0;
        const sustainTime = 3.0;
        const releaseTime = 2.0;
        const totalDur = attackTime + sustainTime + releaseTime;

        const srcGain = this.ctx.createGain();
        srcGain.gain.setValueAtTime(0.5, now);

        [-1, 1].forEach(d => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(f, now);
            osc.detune.setValueAtTime(d, now);
            osc.connect(srcGain);
            osc.start(now); osc.stop(now + totalDur + 0.2);
        });

        const filt = this.ctx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.Q.setValueAtTime(1.2, now);
        filt.frequency.setValueAtTime(800, now);
        filt.frequency.exponentialRampToValueAtTime(180, now + attackTime);
        filt.frequency.setValueAtTime(180, now + attackTime + sustainTime);
        filt.frequency.exponentialRampToValueAtTime(120, now + totalDur);

        const env = this.ctx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.22 * audioState.bassVol, now + attackTime);
        env.gain.setValueAtTime(0.22 * audioState.bassVol, now + attackTime + sustainTime);
        env.gain.exponentialRampToValueAtTime(0.001, now + totalDur);

        const panner = this.ctx.createStereoPanner();
        panner.pan.setValueAtTime(pan, now);

        srcGain.connect(filt);
        filt.connect(env);
        env.connect(panner);
        panner.connect(this.analysers.bass);
    }

    triggerContactSound(freqIndex = null) {
        if (!this.ready || !this.ctx) return;
        const now = this.ctx.currentTime;
        const baseFreq = freqIndex !== null ? this.scales.contact[freqIndex % this.scales.contact.length] : this.scales.contact[Math.floor(Math.random() * this.scales.contact.length)];

        // contactBus: contactVolumeGain(マスターボリューム適用済み)経由でドライ・リバーブ両方へ
        const contactBus = this.ctx.createGain();
        contactBus.gain.value = 1.0;
        if (this.contactVolumeGain) contactBus.connect(this.contactVolumeGain);
        else { contactBus.connect(this.masterGain); if (this.reverbHPF) contactBus.connect(this.reverbHPF); }

        for (let i = 0; i < 3; i++) {
            const delay = i * 0.08;
            const startTime = now + delay;
            const bodyOsc = this.ctx.createOscillator();
            const bodyGain = this.ctx.createGain();
            bodyOsc.type = 'sine';
            bodyOsc.frequency.setValueAtTime(baseFreq, startTime);
            bodyGain.gain.setValueAtTime(0.001, startTime);
            const peakGain = (0.3 / (i + 1));
            bodyGain.gain.linearRampToValueAtTime(peakGain, startTime + 0.01);
            bodyGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);
            bodyOsc.connect(bodyGain);
            bodyGain.connect(contactBus);
            bodyOsc.start(startTime);
            bodyOsc.stop(startTime + 0.6);

            if (i === 0) {
                const clickOsc = this.ctx.createOscillator();
                const clickGain = this.ctx.createGain();
                clickOsc.type = 'square';
                clickOsc.frequency.setValueAtTime(baseFreq * 4, startTime);
                clickGain.gain.setValueAtTime(0.001, startTime);
                clickGain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
                clickGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.02);
                clickOsc.connect(clickGain);
                clickGain.connect(contactBus);
                clickOsc.start(startTime);
                clickOsc.stop(startTime + 0.03);
            }
        }
    }

    triggerInst(part, panX, time = null) {
        if (!this.ready) return;
        const scheduledTime = time !== null ? time : this.ctx.currentTime;
        // 視覚エフェクト(パーティクル)は予約された発音タイミングに合わせて遅延発火させる。
        // タブが非表示の間はどちらにせよ画面が見えないので、このsetTimeoutが多少ズレても問題ない。
        const visualDelayMs = Math.max(0, (scheduledTime - this.ctx.currentTime) * 1000);
        let freqArr;
        if (part === 'strings1') freqArr = this.scales.stringsHigh;
        else if (part === 'strings2') freqArr = this.scales.stringsLow;
        else freqArr = this.scales[part] || this.scales.strings;
        const freq = freqArr[Math.floor(Math.random() * freqArr.length)];
        if (part.includes('strings')) {
            if (audioState.stringsMuted) return;
            this.triggerStrings(freq, panX, 0.5, part === 'strings1' ? 'high' : 'low', scheduledTime);
            setTimeout(() => this.spawnParticle(CONFIG.COLORS.BLUE, this.levelToIntensity(this.analysers.strings)), visualDelayMs);
        } else if (part === 'bass') {
            if (audioState.bassMuted) return;
            this.triggerBassSound(freq, panX, scheduledTime);
            setTimeout(() => this.spawnParticle(CONFIG.COLORS.GRAY, this.levelToIntensity(this.analysers.bass)), visualDelayMs);
        } else if (part.includes('piano')) {
            if (audioState.pianoMuted) return;
            this.triggerPiano(freq, panX, 0.45, part === 'piano1', scheduledTime);
            setTimeout(() => this.spawnParticle(CONFIG.COLORS.RED, this.levelToIntensity(this.analysers.piano)), visualDelayMs);
        }
    }

    // 発火した瞬間の実際の音量を、パーティクルの大きさを決める係数(0.8〜2.2程度)に変換する。
    // 発生そのもの(出るか出ないか)は常に保証し、大きさだけが実際の音量に応じて変わる。
    levelToIntensity(analyser) {
        const lvl = this.getLevel(analyser);
        return 0.8 + lvl * 1.4;
    }

    spawnParticle(colorHex, intensity = 1.0) {
        const angle = Math.random() * Math.PI * 2; const startX = width/2; const startY = centerY + bodyY;
        if (Math.random() < 0.25) entities.push(new MiniCoMyaku(startX, startY, colorHex, angle, intensity));
        else entities.push(new Bubble(startX, startY, colorHex, angle, intensity));
    }

    // Web Audioのクロック(ctx.currentTime)を基準にした先読みスケジューラ。
    // setTimeoutの再帰呼び出しは、バックグラウンドタブ/画面ロック時にブラウザがタイマーを
    // 間引く(スロットリングする)影響を受けてリズムが崩れるため、「未来の発音時刻」を
    // AudioContextの時間軸で予約しておき、短い間隔のポーリングで取りこぼしなく予約していく。
    scheduleStep(step, time) {
        if (step % CONFIG.AUDIO.PRIMES.BASS === 0) this.triggerInst('bass', 0, time);
        if (step % CONFIG.AUDIO.PRIMES.PIANO_1 === 0) this.triggerInst('piano1', -0.4, time);
        if (step % CONFIG.AUDIO.PRIMES.PIANO_2 === 0) this.triggerInst('piano2', 0.4, time);
        if (step % CONFIG.AUDIO.PRIMES.STRINGS_1 === 0) this.triggerInst('strings1', -0.25, time);
        if (step % CONFIG.AUDIO.PRIMES.STRINGS_2 === 0) this.triggerInst('strings2', 0.25, time);
    }

    scheduler() {
        if (!isMasterPlaying || !this.ready) return;
        const scheduleAheadTime = 0.1; // 秒。この時間分だけ先読みして予約する
        while (this.nextStepTime < this.ctx.currentTime + scheduleAheadTime) {
            this.scheduleStep(this.steps, this.nextStepTime);
            const stepDuration = (CONFIG.AUDIO.BASE_TICK / 1000) * audioState.tempoScale;
            this.nextStepTime += stepDuration;
            this.steps++;
        }
    }

    startLoop() {
        // 再開時に古いnextStepTimeが残っていると「停止していた間の分」を一気に
        // まとめて再生してしまうため、再生開始のたびに現在時刻基準でリセットする。
        this.nextStepTime = this.ctx.currentTime + 0.05;
        const lookaheadMs = 25;
        this.schedulerTimer = setInterval(() => this.scheduler(), lookaheadMs);
    }
}

// --- ENTITIES ---
// 軌道: Co-MYAKU中央から放射 + 微小な時計回りドリフト
// サイズ: r/bodyRadiusに比例して拡大(俯瞰カメラのパース効果を再現)

class Bubble {
    constructor(x, y, color, angle, intensity = 1.0) {
        this.baseX = x; this.baseY = y; this.color = color;
        this.startAngle = angle;
        this.r = currentCoMyakuRadius;
        this.radialSpeed = 2.8 + Math.random() * 2.0;
        this.driftRate = 0.002 + Math.random() * 0.002;
        this.frame = 0;
        this.life = 1.0;
        // baseSize: 外周(r=bodyRadius)での基準サイズ。距離に比例して拡大する。
        this.baseSize = (6 + Math.random() * 7) * intensity;
        this.fadeRange = 24;
    }
    update() { this.r += this.radialSpeed; this.frame++; this.life -= 0.004; return this.life > 0; }
    draw(ctx) {
        const angle = this.startAngle + this.driftRate * this.frame;
        const x = this.baseX + this.r * Math.cos(angle);
        const y = this.baseY + this.r * Math.sin(angle);
        const fadeIn = Math.min(1.0, (this.r - currentCoMyakuRadius) / this.fadeRange);
        const fadeOut = this.life < 0.15 ? this.life / 0.15 : 1.0;
        // パース拡大: ハードクランプではなく有理関数で滑らかに漸近(t=1→1.0, t→∞→3.0)
        const t = this.r / currentCoMyakuRadius;
        const scale = t * 3.0 / (t + 2.0);
        const drawSize = this.baseSize * scale;
        ctx.save();
        ctx.globalAlpha = Math.max(0, fadeIn * fadeOut);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(x, y, drawSize, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class MiniCoMyaku {
    constructor(startX, startY, color, angle, intensity = 1.0) {
        this.baseX = startX; this.baseY = startY; this.color = color;
        this.startAngle = angle;
        this.r = currentCoMyakuRadius;
        this.radialSpeed = 2.2 + Math.random() * 1.6;
        this.driftRate = 0.002 + Math.random() * 0.002;
        this.frame = 0;
        this.life = 1.0;
        this.baseSize = (10 + Math.random() * 8) * intensity;
        this.fadeRange = 24;
        const ewAngle = Math.random() * Math.PI * 2;
        this.ewXRatio = Math.cos(ewAngle) * 0.3; this.ewYRatio = Math.sin(ewAngle) * 0.3;
        this.lookX = Math.cos(Math.random() * Math.PI * 2) * 0.5;
        this.lookY = Math.sin(Math.random() * Math.PI * 2) * 0.5;
    }
    update() { this.r += this.radialSpeed; this.frame++; this.life -= 0.0035; return this.life > 0.01; }
    draw(ctx) {
        const angle = this.startAngle + this.driftRate * this.frame;
        const x = this.baseX + this.r * Math.cos(angle);
        const y = this.baseY + this.r * Math.sin(angle);
        const fadeIn = Math.min(1.0, (this.r - currentCoMyakuRadius) / this.fadeRange);
        const fadeOut = this.life < 0.15 ? this.life / 0.15 : 1.0;
        const t = this.r / currentCoMyakuRadius;
        const scale = t * 3.0 / (t + 2.0);
        const s = this.baseSize * scale;
        const ewR = s * CONFIG.CO_MYAKU.EYE_WHITE_RATIO;
        const ewX = this.ewXRatio * s; const ewY = this.ewYRatio * s;
        ctx.save(); ctx.translate(x, y);
        ctx.globalAlpha = Math.max(0, fadeIn * fadeOut);
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ewX, ewY, ewR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = CONFIG.COLORS.BLUE; ctx.beginPath(); ctx.arc(ewX + this.lookX*(ewR*0.5), ewY + this.lookY*(ewR*0.5), s * CONFIG.CO_MYAKU.PUPIL_RATIO, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class Ripple {
    constructor(x, y) { this.x = x; this.y = y; this.life = 1.0; this.r = 10; }
    update() { this.life -= 0.02; this.r += 4; return this.life > 0; }
    draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.strokeStyle = CONFIG.COLORS.BLUE; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
}

class SmallParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const angle = Math.random() * Math.PI * 2; this.vx = Math.cos(angle) * (2 + Math.random() * 4); this.vy = Math.sin(angle) * (2 + Math.random() * 4);
        this.life = 1.0; this.size = 3 + Math.random() * 5;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.96; this.vy *= 0.96; this.life -= 0.03; return this.life > 0; }
    draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
}

class MainCoMyaku {
    constructor() {
        this.updateDimensions();
        
        const initialAngle = -Math.PI / 4; 
        const eyeLimit = currentCoMyakuRadius * this.eyeLimitRatio;
        this.eyeX = Math.cos(initialAngle) * eyeLimit * 0.8;
        this.eyeY = Math.sin(initialAngle) * eyeLimit * 0.8;
        this.targetEyeX = this.eyeX;
        this.targetEyeY = this.eyeY;
        
        const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;
        const relX = Math.cos(initialAngle) * (pupilLimit * 0.8);
        const relY = Math.sin(initialAngle) * (pupilLimit * 0.8);
        
        this.pupilX = this.eyeX + relX;
        this.pupilY = this.eyeY + relY;
        this.targetPupilX = relX; 
        this.targetPupilY = relY;
        
        this.lastTime = performance.now(); this.beatInterval = 60000 / CONFIG.BPM; this.beatCount = 0; this.accumulator = 0;
        this.audioPulse = 0; // 実際の音量(analyser経由)を滑らかに追従させた値。瞳の脈動に使う。
    }
    updateDimensions() {
        this.bodyR = currentCoMyakuRadius;
        this.whiteEyeR = this.bodyR * CONFIG.CO_MYAKU.EYE_WHITE_RATIO;
        this.pupilR = this.bodyR * CONFIG.CO_MYAKU.PUPIL_RATIO;
        this.eyeLimitRatio = (this.bodyR - this.whiteEyeR) / this.bodyR;
        this.pupilLimitRatio = (this.whiteEyeR - this.pupilR) / this.whiteEyeR;
    }
    onTick() {
        if (this.beatCount % 8 === 0 && !isPressing) {
            const eyeLimit = this.bodyR * this.eyeLimitRatio;
            const eAngle = Math.random() * Math.PI * 2; const eDist = (0.7 + Math.random() * 0.3) * eyeLimit;
            this.targetEyeX = Math.cos(eAngle) * eDist; this.targetEyeY = Math.sin(eAngle) * eDist;
            const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;
            const pAngle = Math.random() * Math.PI * 2; const pDist = (0.8 + Math.random() * 0.2) * pupilLimit;
            this.targetPupilX = Math.cos(pAngle) * pDist; this.targetPupilY = Math.sin(pAngle) * pDist;
        }
    }
    update() {
        this.updateDimensions(); 
        const now = performance.now(); const deltaTime = now - this.lastTime; this.lastTime = now;
        const eyeLimit = this.bodyR * this.eyeLimitRatio; const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;
        this.accumulator += deltaTime;
        const effectiveBeatInterval = this.beatInterval * audioState.tempoScale;
        if (this.accumulator >= effectiveBeatInterval) { this.beatCount++; this.accumulator -= effectiveBeatInterval; this.onTick(); }
        
        if (isPressing) {
            const dx = mouseX - width / 2; const dy = mouseY - (centerY + bodyY);
            const dist = Math.hypot(dx, dy); const angle = Math.atan2(dy, dx);
            this.targetEyeX = Math.cos(angle) * Math.min(dist, eyeLimit); this.targetEyeY = Math.sin(angle) * Math.min(dist, eyeLimit);
            const pdx = mouseX - (width / 2 + this.eyeX); const pdy = mouseY - (centerY + bodyY + this.eyeY);
            const pAngle = Math.atan2(pdy, pdx); this.targetPupilX = Math.cos(pAngle) * Math.min(Math.hypot(pdx, pdy), pupilLimit); this.targetPupilY = Math.sin(pAngle) * Math.min(Math.hypot(pdx, pdy), pupilLimit);
        }
        
        const eyeSpeed = (deltaTime / effectiveBeatInterval) * 0.4; 
        const pupilSpeed = (deltaTime / effectiveBeatInterval) * 0.8;
        this.eyeX += (this.targetEyeX - this.eyeX) * Math.min(eyeSpeed, 1.0); 
        this.eyeY += (this.targetEyeY - this.eyeY) * Math.min(eyeSpeed, 1.0);
        const eyeFollowOffset = isPressing ? 0 : (this.eyeX / eyeLimit) * pupilLimit * 0.4;
        const eyeFollowOffsetY = isPressing ? 0 : (this.eyeY / eyeLimit) * pupilLimit * 0.4;
        let currentRelX = this.pupilX - this.eyeX;
        let currentRelY = this.pupilY - this.eyeY;
        currentRelX += (this.targetPupilX + eyeFollowOffset - currentRelX) * Math.min(pupilSpeed, 1.0);
        currentRelY += (this.targetPupilY + eyeFollowOffsetY - currentRelY) * Math.min(pupilSpeed, 1.0);
        const relDist = Math.hypot(currentRelX, currentRelY);
        if (relDist > pupilLimit) {
            const angle = Math.atan2(currentRelY, currentRelX);
            currentRelX = Math.cos(angle) * pupilLimit;
            currentRelY = Math.sin(angle) * pupilLimit;
        }
        this.pupilX = this.eyeX + currentRelX;
        this.pupilY = this.eyeY + currentRelY;
        // 実際に鳴っている音量(analyser経由)を取得し、急な値変化でチカチカしないよう滑らかに追従させる。
        const targetPulse = audioState.liveLevel ? audioState.liveLevel.overall : 0;
        this.audioPulse += (targetPulse - this.audioPulse) * 0.25;
        if (!isMasterPlaying) {
            if (bodyY === 0 && jumpVelocity === 0) { if (--jumpTimer <= 0) { jumpVelocity = -5.5; jumpTimer = 200; } }
            if (jumpVelocity !== 0 || bodyY < 0) { bodyY += jumpVelocity; jumpVelocity += 0.35; if (bodyY > 0) { bodyY = 0; jumpVelocity = 0; bodyScaleY = 0.92; } }
            bodyScaleY += (1.0 - bodyScaleY) * 0.15;
        } else { bodyY *= 0.85; bodyScaleY = 1.0; }
    }
    draw(ctx) {
        ctx.save(); ctx.translate(width/2, centerY + bodyY); ctx.scale(1.0, bodyScaleY);
        ctx.fillStyle = CONFIG.COLORS.RED; ctx.beginPath(); ctx.arc(0, 0, this.bodyR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(this.eyeX, this.eyeY, this.whiteEyeR, 0, Math.PI * 2); ctx.fill();
        // 瞳が脈動して大きくなっても白目からはみ出さないよう、白目の境界までの余裕分でサイズを上限クランプする
        const pupilOffsetDist = Math.hypot(this.pupilX - this.eyeX, this.pupilY - this.eyeY);
        const maxPupilDrawR = Math.max(this.pupilR, (this.whiteEyeR - pupilOffsetDist) * 0.98);
        const pupilDrawR = Math.min(this.pupilR * (1 + this.audioPulse * 0.6), maxPupilDrawR);
        ctx.fillStyle = CONFIG.COLORS.BLUE; ctx.beginPath(); ctx.arc(this.pupilX, this.pupilY, pupilDrawR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

// --- INITIALIZATION ---
const engine = new SoundEngine();
const uiModel = new MainCoMyaku();

async function togglePlayback(e) {
    if (e) e.stopPropagation();
    const btn = document.getElementById('playback-trigger');
    const svg = document.getElementById('play-svg');
    if (isMasterPlaying) { 
        isMasterPlaying = false; 
        if (engine.schedulerTimer) { clearInterval(engine.schedulerTimer); engine.schedulerTimer = null; }
        btn.classList.remove('playing');
        svg.innerHTML = '<path d="M7 4.5 L19 12 L7 19.5 Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" fill="currentColor"/>';
    } else { 
        await engine.init(); 
        isMasterPlaying = true; 
        engine.startLoop(); 
        btn.classList.add('playing');
        svg.innerHTML = '<rect x="5" y="4" width="5" height="16" fill="currentColor" rx="1"/><rect x="14" y="4" width="5" height="16" fill="currentColor" rx="1"/>';
    }
}

document.getElementById('playback-trigger').addEventListener('click', togglePlayback);
document.getElementById('audio-menu-trigger').addEventListener('click', (e) => { e.stopPropagation(); openPanel(); });

document.getElementById('vol-master').oninput = (e) => {
    const db = parseInt(e.target.value); 
    audioState.masterDb = db;
    document.getElementById('val-master').innerText = Math.round(((db + 60) / 60) * 100) + '%'; 
    engine.updateMasterVolume(db);
};

const setTempo = (scale) => {
    audioState.tempoScale = scale;
    const t1 = document.getElementById('tempo-1'); const t2 = document.getElementById('tempo-2');
    t1.classList.toggle('active', scale === 1.0); t1.setAttribute('aria-pressed', String(scale === 1.0));
    t2.classList.toggle('active', scale === 2.0); t2.setAttribute('aria-pressed', String(scale === 2.0));
};
document.getElementById('tempo-1').onclick = () => setTempo(1.0);
document.getElementById('tempo-2').onclick = () => setTempo(2.0);

document.getElementById('rv-metro').onclick    = () => engine.setReverbType('metro');
document.getElementById('rv-pavilion').onclick = () => engine.setReverbType('pavilion');

const toggleMute = (part) => {
    audioState[part + 'Muted'] = !audioState[part + 'Muted'];
    const btn = document.getElementById('mute-' + part);
    btn.classList.toggle('active', audioState[part + 'Muted']);
    btn.setAttribute('aria-pressed', String(audioState[part + 'Muted']));
};
document.getElementById('mute-piano').onclick = () => toggleMute('piano');
document.getElementById('mute-strings').onclick = () => toggleMute('strings');
document.getElementById('mute-bass').onclick = () => toggleMute('bass');
['mute-piano', 'mute-strings', 'mute-bass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById(id).click(); }
    });
});

document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        // 大きな写真をそのままbase64で保持するとモバイルでメモリ・描画負荷が増えるため、
        // 長辺1600pxを上限にダウンスケールしてから背景に適用する。
        const img = new Image();
        img.onload = () => {
            const MAX_DIM = 1600;
            let iw = img.naturalWidth, ih = img.naturalHeight;
            if (iw > MAX_DIM || ih > MAX_DIM) {
                const scale = Math.min(MAX_DIM / iw, MAX_DIM / ih);
                iw = Math.round(iw * scale); ih = Math.round(ih * scale);
            }
            const off = document.createElement('canvas');
            off.width = iw; off.height = ih;
            off.getContext('2d').drawImage(img, 0, 0, iw, ih);
            bgImage.src = off.toDataURL('image/jpeg', 0.85);
            bgImage.style.display = 'block';
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

const globalMove = document.getElementById('global-move');
globalMove.addEventListener('pointerdown', (e) => {
    isPressing = true; mouseX = e.clientX; mouseY = e.clientY;
    // 視覚フィードバックは再生中かどうかに関わらず常に出す。
    // 効果音はAudioContextが初期化済み(engine.ready)であれば鳴る(triggerContactSound内部で判定)。
    engine.triggerContactSound(Math.floor((e.clientX / width) * 8));
    entities.push(new Ripple(e.clientX, e.clientY));
    const colors = [CONFIG.COLORS.RED, CONFIG.COLORS.BLUE, CONFIG.COLORS.WHITE];
    for (let i = 0; i < 10; i++) entities.push(new SmallParticle(e.clientX, e.clientY, colors[i % 3]));
});

window.addEventListener('pointermove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('pointerup', () => { isPressing = false; });

function resize() {
    dpr = window.devicePixelRatio || 1; width = window.innerWidth; height = window.innerHeight;
    canvas.width = width * dpr; canvas.height = height * dpr;
    canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
    ctx.scale(dpr, dpr);

    const dockEl = document.getElementById('dock');
    const dockRect = dockEl.getBoundingClientRect();
    const dockTop = dockRect.top;
    const screenCenterY = height / 2;
    const padding = 40;
    currentCoMyakuRadius = Math.min(CONFIG.CO_MYAKU.RADIUS, (dockTop - padding) / 2.2);
    if (currentCoMyakuRadius < 40) currentCoMyakuRadius = 40;
    centerY = screenCenterY;
    const bottomEdge = centerY + currentCoMyakuRadius;
    const limit = dockTop - padding;
    if (bottomEdge > limit) centerY = limit - currentCoMyakuRadius;

    // 画面回転などでbodyRが変わった際、目・瞳が新しい境界を超えていれば即座にクランプする。
    // これをしないと次のupdate()が呼ばれるまで目が体の外に飛び出して見える。
    if (typeof uiModel !== 'undefined') {
        uiModel.updateDimensions();
        const eyeLimit = uiModel.bodyR * uiModel.eyeLimitRatio;
        const eyeDist = Math.hypot(uiModel.eyeX, uiModel.eyeY);
        if (eyeDist > eyeLimit) {
            const a = Math.atan2(uiModel.eyeY, uiModel.eyeX);
            uiModel.eyeX = Math.cos(a) * eyeLimit;
            uiModel.eyeY = Math.sin(a) * eyeLimit;
            uiModel.targetEyeX = uiModel.eyeX;
            uiModel.targetEyeY = uiModel.eyeY;
        }
        const pupilLimit = uiModel.whiteEyeR * uiModel.pupilLimitRatio;
        const relX = uiModel.pupilX - uiModel.eyeX;
        const relY = uiModel.pupilY - uiModel.eyeY;
        const relDist = Math.hypot(relX, relY);
        if (relDist > pupilLimit) {
            const a = Math.atan2(relY, relX);
            uiModel.pupilX = uiModel.eyeX + Math.cos(a) * pupilLimit;
            uiModel.pupilY = uiModel.eyeY + Math.sin(a) * pupilLimit;
            uiModel.targetPupilX = Math.cos(a) * pupilLimit;
            uiModel.targetPupilY = Math.sin(a) * pupilLimit;
        }
    }
}

function loop() {
    ctx.clearRect(0, 0, width, height);
    entities = entities.filter(e => e.update() ? (e.draw(ctx), true) : false);
    if (engine.ready) audioState.liveLevel = engine.getOverallLevel();
    uiModel.update(); uiModel.draw(ctx);
    requestAnimationFrame(loop);
}

window.onresize = resize;
resize(); loop(); lucide.createIcons();
</script>
